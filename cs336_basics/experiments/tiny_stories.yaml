tokenizer:
  __target__: cs336_basics.tokenizer.Tokenizer.from_file
  tokenizer_snapshot: "./scratch/models/tokenizer_tinystories_10k.msgpack"
  special_tokens:
    - "<|endoftext|>"

model:
  __target__: cs336_basics.model.transformer.Transformer
  vocab_size: $$tokenizer.vocab_size
  context_length: 256
  num_layers: 4
  d_model: 512
  num_heads: 16
  d_ff: 1344
  rope_theta: 10000
  device:
    __target__: 'torch.device'
    device: 'mps'

optimizer:
  __target__: cs336_basics.model.optimizer.AdamW
  params: $$model.parameters
  lr: 0.001
  weight_decay: 0.01
  betas:
    - 0.9
    - 0.999

data_loader:
  __target__: cs336_basics.dataloader.get_data_loader
  dataset_path: "./scratch/datasets/TinyStories-train-10k/*.arrayrecord"
  sequence_length: $$model.context_length
  batch_size: 16

gradient_clip_max_l2_norm: null
iterations: 80000
checkpoint_dir: ./scratch/checkpoints/tiny_stories_10k/
checkpoint_interval: 5000