gradient_clip_max_l2_norm: 1.0
iterations: 20000
loss_averaging_last_k_batches: 100
checkpoint_dir: ./scratch/checkpoints/tiny_stories_10k_2/
checkpoint_interval: 500

tokenizer:
  __target__: cs336_basics.tokenizer.Tokenizer.from_file
  tokenizer_snapshot: "./scratch/models/tokenizer_tinystories_10k.msgpack"
  special_tokens:
    - "<|endoftext|>"

model:
  __target__: cs336_basics.model.transformer.Transformer
  vocab_size: $$tokenizer.vocab_size
  context_length: 256
  num_layers: 4
  d_model: 512
  num_heads: 16
  d_ff: 1344
  rope_theta: 10000
  device:
    __target__: 'torch.device'
    device: 'mps:0'

optimizer:
  __target__: cs336_basics.optimizer.AdamW
  params: $$model.parameters
  lr: 0.001
  weight_decay: 0.01
  betas:
    - 0.9
    - 0.95

learning_rate_schedule:
  __target__: cs336_basics.learning_rate_schedule.CosineLearningRate
  max_learning_rate: 0.0025
  min_learning_rate_ratio: 0.1
  warmup_iters: 500
  cosine_cycle_iters: $$iterations

data_loader:
  __target__: cs336_basics.dataloader.get_data_loader_lazy
  dataset_path: "./scratch/datasets/TinyStories-train-10k/*.arrayrecord"
  sequence_length: $$model.context_length
  samples_per_file: 3500
  batch_size: 128
  num_epochs: 8
  seed: 43

validation_data_loader:
  __target__: cs336_basics.dataloader.get_data_loader_lazy
  dataset_path: "./scratch/datasets/TinyStories-valid-10k/*.arrayrecord"
  sequence_length: $$model.context_length
  samples_per_file: 2048
  batch_size: 128
  num_epochs: 1
  seed: 43
